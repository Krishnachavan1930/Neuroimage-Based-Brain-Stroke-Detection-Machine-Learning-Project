<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clinical Login | StrokeAI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-color: #0F4C81;
            --secondary-color: #1E293B;
            --body-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F4C81 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-logo {
            color: var(--primary-color);
            font-size: 3.5rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--secondary-color);
            letter-spacing: -0.5px;
        }

        .form-floating > .form-control {
            border-radius: 10px;
            border: 1px solid #cbd5e1;
        }

        .form-floating > .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(15, 76, 129, 0.15);
        }

        .btn-login {
            background: var(--primary-color);
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 30px;
            border: none;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: #155e97;
            transform: translateY(-1px);
        }

        /* Demo credentials block */
        .credentials-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-card text-center">
        <i class="bi bi-bezier2 brand-logo"></i>
        <h2 class="brand-name mb-1">StrokeAI</h2>
        <p class="text-muted small mb-4">Clinical AI Brain Stroke Diagnostic Platform</p>
        
        {% if msg %}
        <div class="alert alert-danger alert-dismissible fade show text-start small py-2 rounded-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ msg }}
            <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endif %}

        <form action="/" method="post">
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" id="userInput" placeholder="Username" required autocomplete="off">
                <label for="userInput"><i class="bi bi-person me-2"></i>Username</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control" id="passInput" placeholder="Password" required>
                <label for="passInput"><i class="bi bi-lock me-2"></i>Password</label>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4 small">
                <div class="form-check text-start">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-secondary" for="rememberMe">Remember me</label>
                </div>
            </div>
            
            <button type="submit" class="btn btn-login w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
            </button>
        </form>

        <div class="credentials-box p-3 mt-4 text-start">
            <div class="fw-bold mb-1 text-secondary"><i class="bi bi-info-circle me-1"></i> Demo Login Accounts:</div>
            <div class="row g-1 text-muted">
                <div class="col-6"><strong>Admin:</strong> admin / password</div>
                <div class="col-6"><strong>Doctor:</strong> doctor / password</div>
                <div class="col-12"><strong>Receptionist:</strong> receptionist / password</div>
            </div>
        </div>

        <p class="mt-4 mb-0 text-muted" style="font-size: 0.75rem;">&copy; 2026 StrokeAI Clinical Portal v1.0</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
