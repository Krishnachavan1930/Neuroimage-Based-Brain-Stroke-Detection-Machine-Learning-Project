<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Stroke</title>
    <link rel = "icon" href ="./static/images/bezier.png" type = "image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="./static/css/solution.css">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body >
  <section>
    <!--NAV BAR-->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
     <nav class="navbar bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="./static/images/bezier.svg" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
        </a>
      </div>
    </nav>
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Brain Stroke Prediction</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/logout">Log-out</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

  </section>

  <section>
    <!--jumbotron-->
    <div class="mt-4 p-5 bg-primary text-white rounded">
    <div class="container text-center">
        <h1>Brain Stroke Prediction</h1>
         <p><h5>The brain stroke is being detected using CNN.</h5></p>
    </div>
    </div>
  </section>
  <br><br><br>
  <section>
    <!--form-->
   <div class="container text-center">
        <div class="mt-1">
            <h1 class="text-success">Please upload image.....</h1>
        </div>
       <form class="form-horizontal" action="/submit" method="post" enctype="multipart/form-data">
        <div class="input-group ">
            <input type="file" class="form-control"
                   id="inputGroupFile02" name="my_image">
        </div>
        <br><br>
        <button type="submit" class="btn btn-success">Submit</button>
       </form>
   </div>
  </section>
  <br><br><br>

  <section>
    <div class="container text-center">

    {% if prediction %}
        {{error}}
      <img height="50%" src="{{img_path}}" width="50%">
       <br><br><br>
      <h2> Your Prediction: <i> {{prediction}} </i></h2>
    {% endif %}
    </div>
  </section>













  <section>
    <!-- Footer -->
    <footer class="text-center text-lg-start bg-light text-muted">
      <!-- Copyright -->
      <div class="text-center p-4" style="background-color: rgba(0, 0, 0, 0.05);">
        © 2025 Copyright:
        <a class="text-reset fw-bold" href="https://mdbootstrap.com/">MDBootstrap.com</a>
      </div>
      <!-- Copyright -->
    </footer>
<!-- Footer -->
  </section>




</body>
<script type="text/javascript">
  $(document).ready(function() {
    $('.carousel').carousel({
      interval: 1200
    })
  });
</script>

</html>
